services:
  sentiment-api:
    image: trendvision-sentiment-api:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trendvision-sentiment-api
    ports:
      - "127.0.0.1:8002:8002"
    environment:
      - MODEL_ONNX_PATH=/app/models/sentiment-onnx
      - MAX_LENGTH=64
      - RETURN_SCORES=false
      - LOG_TIMINGS=false
      - HOST=0.0.0.0
      - PORT=8002
      # Throughput: raise to match vCPUs if RAM allows (each worker loads a full model copy).
      - WORKERS=1
      # ORT: 0 = default thread pool (usually all logical CPUs in the container).
      - ORT_INTRA_OP_NUM_THREADS=0
      - ORT_INTER_OP_NUM_THREADS=1
      # Optional: cap BLAS/OpenMP (e.g. same as vCPUs or floor(cpus/workers)).
      # - OMP_NUM_THREADS=2
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app/src
    volumes:
      - ./models:/app/models:ro
    restart: on-failure:3
    networks:
      - trendvision
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/sentiment/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  # Test client container
  test-client:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trendvision-ai-test-client
    profiles:
      - test
    depends_on:
      sentiment-api:
        condition: service_healthy
    entrypoint: ["python", "-c"]
    command:
      - |
        import requests
        import time
        
        # Wait for API to be ready
        for i in range(10):
            try:
                r = requests.get("http://sentiment-api:8002/sentiment/health")
                if r.status_code == 200:
                    print("API is ready!")
                    break
            except:
                pass
            time.sleep(2)
        
        # Test sentiment analysis
        tests = [
            "Stock prices went up today",
            "Company reported losses",
            "Earnings beat expectations",
            "Layoffs announced",
        ]
        
        for text in tests:
            r = requests.post("http://sentiment-api:8002/sentiment", json={"text": text})
            print(f"{text[:40]:40} -> {r.json()}")
    environment:
      - PYTHONUNBUFFERED=1

    networks:
      - trendvision

networks:
  trendvision:
    external: true
